<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Arena</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            background: #1a1a1a;
            image-rendering: pixelated;
        }

        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .resource-bar {
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #333;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 10px;
            font-size: 14px;
        }

#swingMeter {
    position: fixed;
    right: 20px;
    top: 150px;
    width: 200px;
    background: rgba(26, 26, 26, 0.9);
    border: 2px solid #333;
    border-radius: 8px;
    padding: 10px;
    display: none;
}

        #meterBar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        #meterFill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ef4444 0%, #fbbf24 50%, #4ade80 100%);
            transition: width 0.05s linear;
        }

        #inventory {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
        }

        .inv-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        #hotbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .hotbar-slot {
            width: 70px;
            height: 70px;
            background: rgba(26, 26, 26, 0.9);
            border: 3px solid #333;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .hotbar-slot:hover {
            background: rgba(42, 42, 42, 0.9);
            border-color: #555;
            transform: translateY(-3px);
        }

        .hotbar-slot.active {
            border-color: #d69e2e;
            background: rgba(214, 158, 46, 0.2);
        }

        .slot-icon {
            font-size: 32px;
        }

        .slot-label {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 11px;
            color: #888;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 5px;
            border-radius: 3px;
        }

        .slot-cost {
            position: absolute;
            bottom: 2px;
            font-size: 9px;
            color: #aaa;
            background: rgba(0, 0, 0, 0.8);
            padding: 2px 4px;
            border-radius: 3px;
        }

        .btn {
            padding: 10px 20px;
            background: #d69e2e;
            border: 2px solid #b7791f;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }

        .btn:hover {
            background: #b7791f;
        }

        .btn-cancel {
            background: #333;
            border-color: #555;
            color: #fff;
        }

        #playerList {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .player-entry {
            padding: 5px;
            margin-bottom: 5px;
            font-size: 13px;
        }
    </style>
    <script src="relay-client.js"></script>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div class="resource-bar">
            <div>❤️ Health: <span id="healthValue">100</span>/100</div>
        </div>
        <div class="resource-bar">
            <div>👥 Players: <span id="playerCount">1</span></div>
        </div>
    </div>

    <div id="swingMeter">
        <div style="text-align: center; margin-bottom: 5px; font-size: 12px;">Swing Power</div>
        <div id="meterBar">
            <div id="meterFill"></div>
        </div>
        <div style="text-align: center; margin-top: 5px; font-size: 11px;">Click to swing</div>
    </div>

    <div id="inventory">
        <div style="font-weight: bold; margin-bottom: 10px;">Inventory</div>
        <div class="inv-item">
            <span>🪵 Wood:</span>
            <span id="woodCount">20</span>
        </div>
        <div class="inv-item">
            <span>🪨 Stone:</span>
            <span id="stoneCount">10</span>
        </div>
        <div style="margin-top: 10px; font-size: 11px; color: #888;">
            1-4: Select tool/block<br>
            WASD: Move<br>
            Click: Use tool
        </div>
    </div>

    <div id="hotbar">
        <div class="hotbar-slot active" data-slot="0" onclick="selectSlot(0)">
            <div class="slot-icon">🪓</div>
            <div class="slot-label">1</div>
        </div>
        <div class="hotbar-slot" data-slot="1" onclick="selectSlot(1)">
            <div class="slot-icon">🪵</div>
            <div class="slot-label">2</div>
            <div class="slot-cost">5 wood</div>
        </div>
        <div class="hotbar-slot" data-slot="2" onclick="selectSlot(2)">
            <div class="slot-icon">🪨</div>
            <div class="slot-label">3</div>
            <div class="slot-cost">8 stone</div>
        </div>
        <div class="hotbar-slot" data-slot="3" onclick="selectSlot(3)">
            <div class="slot-icon">🟫</div>
            <div class="slot-label">4</div>
            <div class="slot-cost">3 wood</div>
        </div>
    </div>

    <div id="playerList">
        <div style="font-weight: bold; margin-bottom: 10px;">Online Players</div>
        <div id="playersListContent"></div>
    </div>

    <script src="survival-game.js"></script>
</body>
</html>
