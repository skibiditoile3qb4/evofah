        function levenshtein(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) {
                matrix[i] = [i];
            }
            for (let j = 0; j <= a.length; j++) {
                matrix[0][j] = j;
            }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j] + 1
                        );
                    }
                }
            }
            return matrix[b.length][a.length];
        }

async function tryLoadingGame(game, startAttempt = 0) {
    const baseUrl = 'https://lnahtml.github.io/';
    const frame = document.getElementById('gameFrame');
    
    // Show loading
    frame.srcdoc = `
        <style>
            body { 
                margin: 0; 
                background: #0a0a0a; 
                color: #fff; 
                display: flex; 
                align-items: center; 
                justify-content: center; 
                height: 100vh; 
                font-family: Arial;
            }
            .spinner {
                border: 3px solid #333;
                border-top: 3px solid #d69e2e;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                animation: spin 1s linear infinite;
                margin-bottom: 20px;
            }
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        </style>
        <div style="text-align: center;">
            <div class="spinner"></div>
            <div>Loading ${formatGameName(game)}...</div>
        </div>
    `;
    
    // First try just /a/ (without number)
    const simpleUrl = `${baseUrl}a/${game}`;
    const simpleValid = await testGameUrl(simpleUrl);
    
    if (simpleValid) {
        frame.removeAttribute('srcdoc');
        gameUrlCache[game] = 'simple';
        saveUrlCache();
        frame.src = simpleUrl;
        console.log(`✅ Found ${game} at /a/`);
        return;
    }
    
    // Try all URLs from startAttempt to 9
    for (let i = startAttempt; i <= 9; i++) {
        const testUrl = `${baseUrl}a${i}/${game}`;
        
        // Test if the actual game directory exists
        const isValid = await testGameUrl(testUrl);
        
        if (isValid) {
            // Found it! Remove srcdoc attribute and load the game
            frame.removeAttribute('srcdoc');
            gameUrlCache[game] = i;
            saveUrlCache();
            frame.src = testUrl;
            console.log(`✅ Found ${game} at a${i}`);
            return;
        }
    }
    
    // Nothing found
    frame.removeAttribute('srcdoc');
    alert(`Could not find ${formatGameName(game)}. It may have been removed.`);
    backToMain();
}

// Test if a game URL is valid by checking response text
async function testGameUrl(url) {
    try {
        const response = await fetch(url);
        const text = await response.text();
        
        // Check if it's a 404 page (GitHub's 404 page contains specific text)
        if (text.includes("There isn't a GitHub Pages site here") || 
            text.includes("404") && text.includes("GitHub Pages")) {
            return false;
        }
        
        // If it's actual HTML content (not a 404), it's valid
        return true;
    } catch (e) {
        return false;
    }
}

// Show visual feedback for bonuses
function showBonus(bonus, multiplier, type) {
    const notification = document.createElement('div');
    
    let bgGradient, borderColor, emoji, label;
    
    if (type === 'potion') {
        bgGradient = 'linear-gradient(135deg, #9333ea 0%, #c084fc 100%)';
        borderColor = '#a855f7';
        emoji = '🧪';
        label = 'Potion Boost';
    } else if (type === 'lightning-blade') {
        bgGradient = 'linear-gradient(135deg, #ffff00 0%, #ffd700 100%)';
        borderColor = '#fff';
        emoji = '⚡';
        label = 'Lightning Blade';
    } else {
        // Sword bonus
        bgGradient = 'linear-gradient(135deg, #ff4500 0%, #ff8c00 100%)';
        borderColor = '#ffd700';
        emoji = multiplier === 2.0 ? '🐉' : '⚔️';
        label = 'Sword Bonus';
    }
    
    notification.style.cssText = `
        position: fixed;
        top: 80px;
        right: 20px;
        background: ${bgGradient};
        border: 2px solid ${borderColor};
        border-radius: 12px;
        padding: 15px 25px;
        z-index: 10001;
        color: #fff;
        font-weight: bold;
        font-size: 16px;
        box-shadow: 0 4px 15px rgba(147, 51, 234, 0.4);
        animation: slideInRight 0.3s ease-out, fadeOutRight 0.3s ease-in 2.7s;
    `;
    
    notification.innerHTML = `${emoji} ${label}: +${Math.floor(bonus)} coins!`;
    
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.remove();
    }, 3000);
}

// Single potion system (no stacking)
function getActivePotion() {
    try {
        const saved = localStorage.getItem('_activePotion');
        if (saved) {
            const potion = JSON.parse(saved);
            const now = Date.now();
            
            // Check if expired
            if (now >= potion.endTime) {
                clearActivePotion();
                return null;
            }
            return potion;
        }
    } catch(e) {}
    return null;
}

function setPotionActive(potion) {
    try {
        localStorage.setItem('_activePotion', JSON.stringify(potion));
        
        // Auto-clear after expiration
        const duration = potion.endTime - Date.now();
        setTimeout(() => {
            clearActivePotion();
            alert('⚡ Lightning Potion effect ended!');
        }, duration);
    } catch(e) {}
}

function clearActivePotion() {
    try {
        localStorage.removeItem('_activePotion');
    } catch(e) {}
}

function isPotionActive() {
    return getActivePotion() !== null;
}
    let lightningBladeState = {
    active: false,
    endTime: 0,
    cooldownEnd: 0
};

// Load persisted state
function loadLightningState() {
    try {
        const saved = localStorage.getItem('_lightningBlade');
        if (saved) {
            lightningBladeState = JSON.parse(saved);
            // Check if effects have expired
            const now = Date.now();
            if (lightningBladeState.active && now >= lightningBladeState.endTime) {
                lightningBladeState.active = false;
                lightningBladeState.cooldownEnd = now + (45 * 60 * 1000);
                saveLightningState();
            }
            if (now >= lightningBladeState.cooldownEnd) {
                lightningBladeState.cooldownEnd = 0;
            }
        }
    } catch(e) {}
}

function saveLightningState() {
    try {
        localStorage.setItem('_lightningBlade', JSON.stringify(lightningBladeState));
    } catch(e) {}
}

function updateLightningIcon() {
    const icon = document.getElementById('lightningIcon');
    const hasLightning = userProfile.equippedCosmetics?.sword === 'lightning';
    const now = Date.now();
    
    if (!hasLightning) {
        icon.style.display = 'none';
        return;
    }
    
    // Show icon only when not on cooldown
    if (now < lightningBladeState.cooldownEnd) {
        icon.style.display = 'none';
    } else {
        icon.style.display = 'flex';
        if (lightningBladeState.active) {
            icon.classList.add('active');
        } else {
            icon.classList.remove('active');
        }
    }
}

function activateLightningBlade() {
    const now = Date.now();
    
    if (lightningBladeState.active) {
        const remaining = Math.ceil((lightningBladeState.endTime - now) / 1000);
        alert(`⚡ Lightning Blade is already active! ${remaining}s remaining.`);
        return;
    }
    
    if (now < lightningBladeState.cooldownEnd) {
        const cooldownMin = Math.ceil((lightningBladeState.cooldownEnd - now) / 60000);
        alert(`⚡ Lightning Blade is on cooldown! ${cooldownMin} minutes remaining.`);
        return;
    }
    
    // Activate ability
    lightningBladeState.active = true;
    lightningBladeState.endTime = now + (5 * 60 * 1000); // 5 minutes
    saveLightningState();
    updateLightningIcon();
    
    alert('⚡ Lightning Blade activated! All profits DOUBLED for 5 minutes!');
    
    // Auto-deactivate after 5 minutes
    setTimeout(() => {
        lightningBladeState.active = false;
        lightningBladeState.cooldownEnd = Date.now() + (45 * 60 * 1000); // 45 min cooldown
        saveLightningState();
        updateLightningIcon();
        alert('⚡ Lightning Blade effect ended. Entering 45-minute cooldown.');
    }, 5 * 60 * 1000);
}
