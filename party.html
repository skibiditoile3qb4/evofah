<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Party Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .back-btn {
            padding: 12px 24px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .back-btn:hover {
            background: #252525;
        }
        .party-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            height: calc(100vh - 150px);
        }
        .sidebar {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .create-join-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .input-group label {
            font-size: 12px;
            color: #888;
        }
        .input-group input {
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }
        .btn {
            padding: 12px 16px;
            background: #d69e2e;
            border: 1px solid #b7791f;
            border-radius: 6px;
            color: #000;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #b7791f;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .party-info {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
        }
        .party-info h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #d69e2e;
        }
        .party-code {
            font-family: monospace;
            font-size: 24px;
            text-align: center;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #555;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .party-code:hover {
            background: #252525;
        }
        .members-list {
            flex: 1;
            overflow-y: auto;
        }
        .member-item {
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .member-item.leader {
            border-color: #d69e2e;
        }
        .member-name {
            font-size: 14px;
        }
        .leader-badge {
            background: #d69e2e;
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
        .kick-btn {
            background: #ff4444;
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }
        .kick-btn:hover {
            background: #cc0000;
        }
        .chat-area {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .message {
            padding: 8px 12px;
            background: #1a1a1a;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #333;
        }
        .message.system {
            text-align: center;
            color: #888;
            font-style: italic;
            font-size: 13px;
        }
        .message.donation {
            border-left-color: #ffd700;
            background: linear-gradient(90deg, #1a1a1a 0%, rgba(255, 215, 0, 0.1) 100%);
        }
        .message-header {
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 13px;
        }
        .message-text {
            color: #ccc;
            font-size: 14px;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }
        .donate-section {
            background: #0a0a0a;
            border: 1px solid #ffd700;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .donate-section h4 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .donate-form {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .donate-form input,
        .donate-form select {
            padding: 8px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
        }
        .donate-form input {
            flex: 1;
            min-width: 100px;
        }
        .donate-form select {
            width: 80px;
        }
        .donate-btn {
            padding: 8px 16px;
            background: #ffd700;
            border: none;
            border-radius: 4px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }
        .donate-btn:hover {
            background: #d69e2e;
        }
    </style>
    <script src="PlayerSphere.js"></script>
    <script src="relay-client.js"></script>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="window.location.href='index.html'">← Back to Main</button>
        
        <h1>🎮 Party Chat</h1>
        
        <div class="party-container">
            <!-- Sidebar -->
            <div class="sidebar">
                <div id="createJoinSection" class="create-join-section">
                    <button class="btn" onclick="createParty()">Create Party</button>
                    <div class="input-group">
                        <label>Join Party Code</label>
                        <input type="text" id="joinCode" placeholder="12345" maxlength="5">
                    </div>
                    <button class="btn" onclick="joinParty()">Join Party</button>
                </div>
                
                <div id="partyInfoSection" style="display: none;">
                    <div class="party-info">
                        <h3>Party Code</h3>
                        <div class="party-code" id="partyCode" onclick="copyCode()" title="Click to copy">-----</div>
                        <small style="color: #888;">Share this code with friends!</small>
                    </div>
                    
                    <h3 style="margin-top: 20px; margin-bottom: 10px;">Members</h3>
                    <div class="members-list" id="membersList"></div>
                    
                    <button class="btn" id="leaveBtn" style="background: #ff4444; border-color: #cc0000; margin-top: 10px;" onclick="leaveParty()">Leave Party</button>
                    <button class="btn" id="disbandBtn" style="background: #cc0000; border-color: #990000; margin-top: 5px; display: none;" onclick="disbandParty()">Disband Party</button>
                </div>
            </div>
            
            <!-- Chat Area -->
            <div class="chat-area">
                <div id="notInParty" style="display: flex; align-items: center; justify-content: center; height: 100%; color: #888; font-size: 18px;">
                    Create or join a party to start chatting!
                </div>
                
                <div id="chatSection" style="display: none; flex: 1; display: flex; flex-direction: column;">
                    <div class="messages" id="messages"></div>
                    
                    <div class="input-area">
                        <input type="text" id="messageInput" placeholder="Type a message..." maxlength="200" onkeypress="if(event.key==='Enter') sendMessage()">
                        <button class="btn" onclick="sendMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const RELAY_SERVER = 'wss://relayfah.onrender.com';
        let relay = null;
        let currentParty = null;
        let isLeader = false;
        let userProfile = getUserProfile();
        let coins = getCoins();
        let gems = userProfile.gems || 0;
        
        function getUserProfile() {
            try {
                const stored = localStorage.getItem('userProfile');
                if (stored) return JSON.parse(stored);
            } catch(e) {}
            return { username: 'guest' + Math.floor(Math.random() * 1000000), status: 'player' };
        }
        
        function getCoins() {
            try {
                const stored = localStorage.getItem(atob('X2NvaW5EYXRh'));
                if (stored) return parseInt(atob(stored.split('').reverse().join('')));
            } catch(e) {}
            return 10;
        }
        
        function setCoins(amount) {
            try {
                localStorage.setItem(atob('X2NvaW5EYXRh'), btoa(amount.toString()).split('').reverse().join(''));
                coins = amount;
            } catch(e) {}
        }
        
        function saveUserProfile(profile) {
            try {
                localStorage.setItem('userProfile', JSON.stringify(profile));
            } catch(e) {}
        }
        
        function generatePartyCode() {
            return Math.floor(10000 + Math.random() * 90000).toString();
        }
        
        async function createParty() {
            try {
                relay = new RelayClient(RELAY_SERVER);
                await relay.connect();
                
                currentParty = generatePartyCode();
                isLeader = true;
                
                relay.joinRoom('party_' + currentParty, userProfile.username, userProfile.status);
                
                setupRelayHandlers();
                showPartyUI();
                
                document.getElementById('partyCode').textContent = currentParty;
                addSystemMessage('Party created! Share the code with friends.');
                
            } catch (error) {
                console.error('Failed to create party:', error);
                alert('Failed to create party. Please try again.');
            }
        }
        
        async function joinParty() {
            const code = document.getElementById('joinCode').value.trim();
            
            if (!code || code.length !== 5) {
                alert('Please enter a valid 5-digit party code');
                return;
            }
            
            try {
                relay = new RelayClient(RELAY_SERVER);
                await relay.connect();
                
                currentParty = code;
                isLeader = false;
                
                relay.joinRoom('party_' + currentParty, userProfile.username, userProfile.status);
                
                setupRelayHandlers();
                showPartyUI();
                
                document.getElementById('partyCode').textContent = currentParty;
                
            } catch (error) {
                console.error('Failed to join party:', error);
                alert('Failed to join party. Please check the code and try again.');
            }
        }
        
        function setupRelayHandlers() {
            relay.on('joined', (data) => {
                updateMembersList(data.players);
                
                if (data.chatHistory && data.chatHistory.length > 0) {
                    data.chatHistory.forEach(msg => {
                        displayMessage(msg);
                    });
                }
            });
            
            relay.on('chat_message', (data) => {
                displayMessage(data.message);
            });
            
            relay.on('player_joined', (data) => {
                addSystemMessage(`${data.player.username} joined the party`);
                // Request updated player list
                setTimeout(() => {
                    relay.send({ type: 'get_players' });
                }, 100);
            });
            
            relay.on('player_left', (data) => {
                addSystemMessage(`${data.player.username} left the party`);
            });
            
            relay.on('donation', (data) => {
                handleDonation(data);
            });
            
            relay.on('kick', (data) => {
                if (data.targetId === relay.clientId) {
                    alert('You have been kicked from the party');
                    leaveParty();
                }
            });
            
            relay.on('disband', (data) => {
                alert('The party has been disbanded by the leader');
                leaveParty();
            });
        }
        
        function showPartyUI() {
            document.getElementById('createJoinSection').style.display = 'none';
            document.getElementById('partyInfoSection').style.display = 'block';
            document.getElementById('notInParty').style.display = 'none';
            document.getElementById('chatSection').style.display = 'flex';
            
            // Show disband button only for leader
            document.getElementById('disbandBtn').style.display = isLeader ? 'block' : 'none';
        }
        
        function updateMembersList(players) {
            const list = document.getElementById('membersList');
            list.innerHTML = '';
            
            players.forEach((player, index) => {
                const div = document.createElement('div');
                div.className = 'member-item' + (index === 0 ? ' leader' : '');
                
                div.innerHTML = `
                    <span class="member-name">${player.username}</span>
                    <div>
                        ${index === 0 ? '<span class="leader-badge">LEADER</span>' : ''}
                        ${isLeader && index !== 0 ? `<button class="kick-btn" onclick="kickMember('${player.id}')">Kick</button>` : ''}
                    </div>
                `;
                
                list.appendChild(div);
            });
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (message && relay && relay.connected) {
                relay.sendChat(message);
                input.value = '';
            }
        }
        
        function displayMessage(msg) {
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message';
            
            div.innerHTML = `
                <div class="message-header">${msg.username}</div>
                <div class="message-text">${escapeHtml(msg.message)}</div>
            `;
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message system';
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function sendDonation() {
            const username = document.getElementById('donateUsername').value.trim();
            const amount = parseInt(document.getElementById('donateAmount').value);
            const type = document.getElementById('donateType').value;
            
            if (!username || !amount || amount <= 0) {
                alert('Please enter a valid username and amount');
                return;
            }
            
            // Check if user has enough
            const balance = type === 'coins' ? coins : gems;
            
            if (balance < amount) {
                alert(`Not enough ${type}! You have ${balance} ${type}.`);
                return;
            }
            
            // Deduct from sender
            if (type === 'coins') {
                setCoins(coins - amount);
            } else {
                userProfile.gems -= amount;
                gems = userProfile.gems;
                saveUserProfile(userProfile);
            }
            
            // Send donation event
            relay.send({
                type: 'donation',
                targetUsername: username,
                amount: amount,
                donationType: type,
                from: userProfile.username
            });
            
            addSystemMessage(`You donated ${amount} ${type} to ${username}`);
            
            // Clear form
            document.getElementById('donateUsername').value = '';
            document.getElementById('donateAmount').value = '';
        }
        
        function disbandParty() {
            if (!isLeader) {
                alert('Only the party leader can disband the party');
                return;
            }
            
            if (!confirm('Are you sure you want to disband this party? All members will be disconnected.')) {
                return;
            }
            
            // Send disband notification to all members
            relay.send({
                type: 'disband'
            });
            
            // Leave party
            setTimeout(() => {
                leaveParty();
            }, 500);
        }
        
        function handleDonation(data) {
            if (data.targetUsername === userProfile.username) {
                // Receive donation
                if (data.donationType === 'coins') {
                    setCoins(coins + data.amount);
                } else {
                    userProfile.gems += data.amount;
                    gems = userProfile.gems;
                    saveUserProfile(userProfile);
                }
                
                const messagesDiv = document.getElementById('messages');
                const div = document.createElement('div');
                div.className = 'message donation';
                div.innerHTML = `
                    <div class="message-header">💰 Donation Received!</div>
                    <div class="message-text">${data.from} sent you ${data.amount} ${data.donationType}!</div>
                `;
                messagesDiv.appendChild(div);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }
        
        function kickMember(memberId) {
            if (!isLeader) return;
            
            relay.send({
                type: 'kick',
                targetId: memberId
            });
        }
        
        function leaveParty() {
            if (relay) {
                relay.disconnect();
            }
            
            currentParty = null;
            isLeader = false;
            
            document.getElementById('createJoinSection').style.display = 'flex';
            document.getElementById('partyInfoSection').style.display = 'none';
            document.getElementById('notInParty').style.display = 'flex';
            document.getElementById('chatSection').style.display = 'none';
            document.getElementById('messages').innerHTML = '';
            document.getElementById('joinCode').value = '';
        }
        
        function copyCode() {
            navigator.clipboard.writeText(currentParty);
            const el = document.getElementById('partyCode');
            const original = el.textContent;
            el.textContent = 'Copied!';
            setTimeout(() => {
                el.textContent = original;
            }, 1000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
