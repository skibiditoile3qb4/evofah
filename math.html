<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends & DMs</title>
  <script src="relay-client.js"></script>
  <style>
    body { background:#0d0d0d; color:#fff; font-family:Arial,sans-serif; margin:0; padding:20px; }
    .row { display:flex; gap:10px; align-items:center; }
    button,input { border:1px solid #333; background:#1a1a1a; color:#fff; border-radius:8px; padding:10px; }
    .friend { display:flex; justify-content:space-between; align-items:center; padding:10px; border:1px solid #333; border-radius:8px; margin:8px 0; }
    .online { color:#22c55e; }
    .offline { color:#ef4444; }
    #dmWindow { display:none; margin-top:16px; border:1px solid #333; border-radius:10px; padding:12px; max-width:520px; }
    #dmMessages { height:220px; overflow:auto; background:#111; border-radius:8px; padding:10px; margin-bottom:8px; }
    .msg { margin:6px 0; }
    .muted { color:#aaa; font-size:12px; }
    .friend-name { display:flex; align-items:center; gap:8px; }
    .friend-unread-dot { width:9px; height:9px; border-radius:50%; background:#ef4444; display:inline-block; }
  </style>
</head>
<body>
  <div class="row" style="justify-content:space-between;max-width:800px;">
    <h2 style="margin:0;">👥 Friends</h2>
    <button id="mainBtn">⬅ Main</button>
  </div>
  <p class="muted">Add friends from the main page using friend requests. DMs only work when both players are online. Messages are stored in localStorage and can be lost if storage is cleared.</p>

  <div id="friendsList" style="max-width:800px;"></div>

  <div id="dmWindow">
    <h3 id="dmTitle" style="margin-top:0;">DM</h3>
    <div id="dmMessages"></div>
    <div class="row">
      <input id="dmInput" placeholder="Type a DM..." maxlength="240" style="flex:1;" />
      <button id="sendDmBtn">Send</button>
    </div>
  </div>

<script>
const RELAY_SERVER = 'wss://relayfah.onrender.com';
const userProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
let relay = null;
let onlineUsernames = new Set();
let activeFriend = null;

if (!userProfile.username) {
  alert('Log in first.');
  window.location.href = 'index.html';
}

function friendsKey() { return `_friends_${userProfile.username}`; }
function getFriends() {
  try { return JSON.parse(localStorage.getItem(friendsKey()) || '[]'); }
  catch (e) { return []; }
}
function setFriends(list) { localStorage.setItem(friendsKey(), JSON.stringify(Array.from(new Set(list)))); }
function unreadKey() { return `_dm_unread_friends_${userProfile.username}`; }
function getUnreadFriends() {
  try { return new Set(JSON.parse(localStorage.getItem(unreadKey()) || '[]')); }
  catch (e) { return new Set(); }
}
function setUnreadFriends(namesSet) {
  localStorage.setItem(unreadKey(), JSON.stringify(Array.from(namesSet)));
  if (namesSet.size > 0) {
    localStorage.setItem('_dm_unread', '1');
  } else {
    localStorage.removeItem('_dm_unread');
  }
}
function convoKey(friend) { return `_dm_${userProfile.username}_${friend}`; }
function inboundConvoKey(friend) { return `_dm_${friend}_${userProfile.username}`; }

function getConversation(friend) {
  let all = [];
  try { all = all.concat(JSON.parse(localStorage.getItem(convoKey(friend)) || '[]')); } catch(e){}
  try { all = all.concat(JSON.parse(localStorage.getItem(inboundConvoKey(friend)) || '[]')); } catch(e){}
  return all.sort((a,b) => (a.timestamp||0)-(b.timestamp||0));
}

function renderFriends() {
  const el = document.getElementById('friendsList');
  const friends = getFriends();
  if (!friends.length) {
    el.innerHTML = '<div class="muted">No friends yet.</div>';
    return;
  }

  el.innerHTML = friends.map(name => {
    const online = onlineUsernames.has(name);
    const hasUnread = getUnreadFriends().has(name);
    return `<div class="friend">
      <div class="friend-name"><b>${escapeHtml(name)}</b>${hasUnread ? '<span class="friend-unread-dot" title="Unread DM"></span>' : ''} <span class="${online ? 'online' : 'offline'}">● ${online ? 'online' : 'offline'}</span></div>
      <div class="row">
        <button onclick="openDM('${name.replace(/'/g, "\\'")}')">DM</button>
        <button onclick="removeFriend('${name.replace(/'/g, "\\'")}')">Remove</button>
      </div>
    </div>`;
  }).join('');
}

function openDM(friend) {
  activeFriend = friend;
  const unreadFriends = getUnreadFriends();
  unreadFriends.delete(friend);
  setUnreadFriends(unreadFriends);
  document.getElementById('dmWindow').style.display = 'block';
  document.getElementById('dmTitle').textContent = `DM with ${friend}`;
  renderFriends();
  renderDM();
}

function renderDM() {
  if (!activeFriend) return;
  const msgs = getConversation(activeFriend);
  const box = document.getElementById('dmMessages');
  box.innerHTML = msgs.map(m => `<div class="msg"><b>${escapeHtml(m.from)}:</b> ${escapeHtml(m.message)}</div>`).join('');
  box.scrollTop = box.scrollHeight;
}

function removeFriend(name) {
  const next = getFriends().filter(f => f !== name);
  setFriends(next);
  renderFriends();
}

function saveOutgoingDM(to, text) {
  let msgs = [];
  try { msgs = JSON.parse(localStorage.getItem(convoKey(to)) || '[]'); } catch(e){}
  msgs.push({ from: userProfile.username, to, message: text, timestamp: Date.now() });
  localStorage.setItem(convoKey(to), JSON.stringify(msgs));
}

function sendDM() {
  const text = document.getElementById('dmInput').value.trim();
  if (!text || !activeFriend) return;

  if (!relay || !relay.connected || !onlineUsernames.has(activeFriend)) {
    alert('Both players must be online to DM.');
    return;
  }

  relay.sendDM(activeFriend, text);
  saveOutgoingDM(activeFriend, text);
  document.getElementById('dmInput').value = '';
  renderDM();
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text || '';
  return d.innerHTML;
}

async function initRelay() {
  relay = new RelayClient(RELAY_SERVER);

  relay.on('players_update', (data) => {
    onlineUsernames = new Set((data.players || []).map(p => p.username));
    renderFriends();
  });

  relay.on('joined', (data) => {
    onlineUsernames = new Set((data.players || []).map(p => p.username));
    renderFriends();
  });

  relay.on('dm_message', (data) => {
    const key = convoKey(data.fromUsername);
    let msgs = [];
    try { msgs = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){}
    msgs.push({ from: data.fromUsername, to: userProfile.username, message: data.message, timestamp: Date.now() });
    localStorage.setItem(key, JSON.stringify(msgs));
    const unreadFriends = getUnreadFriends();
    unreadFriends.add(data.fromUsername);
    setUnreadFriends(unreadFriends);
    renderFriends();
    if (activeFriend === data.fromUsername) renderDM();
  });

  await relay.connect();
  relay.joinRoom('global_chat', userProfile.username, userProfile.status, userProfile.permanentId);
}

document.getElementById('mainBtn').addEventListener('click', () => {
  window.location.href = 'index.html';
});

document.getElementById('sendDmBtn').addEventListener('click', sendDM);
document.getElementById('dmInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendDM(); });

renderFriends();
initRelay().catch(() => {
  alert('Could not connect to relay. Online indicators/DM sending disabled.');
});

window.openDM = openDM;
window.removeFriend = removeFriend;
</script>
</body>
</html>
