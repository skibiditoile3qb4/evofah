<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gladiators Tournament</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #0a0a0a; color: #fff; overflow: hidden;
        }
        
        .screen { display: none; width: 100vw; height: 100vh; padding: 20px; }
        .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        h1 { font-size: 48px; margin-bottom: 20px; 
            background: linear-gradient(135deg, #ff4500 0%, #ffd700 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        #playerList {
            background: #1a1a1a; border: 2px solid #333; border-radius: 12px;
            padding: 20px; min-width: 400px; margin-bottom: 20px; max-height: 400px; overflow-y: auto;
        }
        .player-item {
            padding: 12px; background: #0a0a0a; border-left: 3px solid #d69e2e;
            border-radius: 6px; margin-bottom: 10px; display: flex;
            justify-content: space-between; align-items: center;
        }
        
        #countdownTimer {
            font-size: 32px; font-weight: bold; color: #ffd700;
            margin-top: 20px; text-align: center;
        }
        
        #battleArena {
            width: 100%; height: 100%; background: #1a1a1a;
            position: relative; overflow: hidden;
        }
        
        .arena-box {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, #2a2a2a 0%, #1a1a1a 100%);
            border: 4px solid #444;
        }
        
        .player {
            position: absolute; width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; transition: left 0.05s linear, top 0.05s linear; z-index: 10;
        }
        
        .player-name {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            font-weight: bold; font-size: 12px; white-space: nowrap;
            background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px;
        }
        
        .health-bar {
            position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 16px; background: #333; border-radius: 4px; overflow: hidden;
        }
        .health-fill {
            width: 100%; height: 100%; background: linear-gradient(90deg, #4ade80 0%, #22c55e 100%);
            transition: width 0.3s;
        }
        .health-text {
            position: absolute; top: 0; left: 0; right: 0; text-align: center;
            line-height: 16px; font-size: 10px; font-weight: bold;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
        }
        
        .sword-swing {
            position: absolute; width: 60px; height: 4px; background: #fff;
            border-radius: 2px; transform-origin: left center;
            pointer-events: none; opacity: 0;
        }
        
        #attackMeter {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 400px; background: #1a1a1a; border: 2px solid #333;
            border-radius: 12px; padding: 15px; z-index: 100;
        }
        #meterLabel {
            text-align: center; margin-bottom: 10px; font-size: 16px; font-weight: bold;
        }
        #meterBar {
            width: 100%; height: 30px; background: #333; border-radius: 6px;
            overflow: hidden; position: relative;
        }
        #meterFill {
            width: 0%; height: 100%; transition: width 0.05s linear;
            background: linear-gradient(90deg, #333 0%, #ef4444 10%, #fbbf24 50%, #4ade80 100%);
        }
        #attackInstruction {
            text-align: center; margin-top: 10px; font-size: 13px; color: #888;
        }
        
        .damage-number {
            position: absolute; font-size: 28px; font-weight: bold; color: #ff4444;
            text-shadow: 0 0 10px rgba(0,0,0,0.8); pointer-events: none;
            animation: floatUp 1s ease-out forwards; z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-80px); }
        }
        .critical-hit { color: #ffd700; font-size: 36px; }
        .weak-hit { color: #666; font-size: 20px; }
        
        #battleInfo {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            text-align: center; font-size: 18px; background: rgba(26, 26, 26, 0.9);
            padding: 12px 24px; border-radius: 8px; font-weight: bold; z-index: 50;
        }
        
        #spectatorNotice {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(214, 158, 46, 0.2); border: 2px solid #d69e2e;
            padding: 15px 30px; border-radius: 8px; font-size: 16px; z-index: 50;
        }
        
        #resultsScreen h1 { margin-bottom: 30px; }
        #prizeInfo { font-size: 24px; color: #ffd700; margin-bottom: 20px; }
        .btn {
            padding: 16px 48px; background: #d69e2e; border: 2px solid #b7791f;
            border-radius: 8px; color: #000; font-weight: bold; font-size: 18px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn:hover { background: #b7791f; transform: scale(1.05); }
    </style>
</head>
<body>
    <!-- Lobby Screen -->
    <div id="lobbyScreen" class="screen active">
        <h1>⚔️ GLADIATORS TOURNAMENT</h1>
        <div id="playerList">
            <h3 style="margin-bottom: 15px; text-align: center;">Players in Lobby</h3>
            <div id="playersContainer"></div>
        </div>
        <div id="countdownTimer">Waiting for players...</div>
        <div style="margin-top: 20px; font-size: 14px; color: #888; text-align: center;">
            Tournament starts when timer reaches 0:00<br>
            Join now to participate!
        </div>
    </div>
    
    <!-- Battle Screen -->
    <div id="battleScreen" class="screen">
        <div id="battleArena">
            <div id="battleInfo">FIGHT!</div>
            <div id="spectatorNotice" style="display: none;">👁️ SPECTATING</div>
            
            <div class="arena-box"></div>
            
            <div id="attackMeter">
                <div id="meterLabel">Swing Power</div>
                <div id="meterBar">
                    <div id="meterFill"></div>
                </div>
                <div id="attackInstruction">Use Arrow Keys to move • Click to attack when close</div>
            </div>
        </div>
    </div>
    
    <!-- Results Screen -->
    <div id="resultsScreen" class="screen">
        <h1 id="resultTitle"></h1>
        <div id="prizeInfo"></div>
        <button class="btn" onclick="returnToLobby()">RETURN TO LOBBY</button>
    </div>

    <script>
        const RELAY_SERVER = 'wss://relayfah.onrender.com';
        const ROOM_ID = 'gladiators_global';
        const TOURNAMENT_WAIT_TIME = 1 * 60 * 1000; // 1 minute
        const ATTACK_CHARGE_TIME = 2500;
        const PLAYER_SPEED = 3;
        const ATTACK_RANGE = 80;
        
        let relay, userProfile, myPlayerId;
        let allPlayers = [];
        let tournamentStartTime = null;
        let countdownInterval = null;
        let gameState = { bracket: null, currentMatchIndex: 0, tournamentActive: false };
        let currentMatch = null, isSpectator = false;
        
        // Battle state
        let players = new Map();
        let myHealth = 100, opponentHealth = 100;
        let keys = {};
        let meterCharge = 0;
        let canAttack = true;
        let isCharging = false;
        let chargeInterval = null;
        let heartbeatInterval = null;
        let positionUpdateInterval = null;
        let disconnectCheckInterval = null;
        const HEARTBEAT_INTERVAL = 2000;
        const DISCONNECT_CHECK_TIME = 5000;

        function loadUserProfile() {
            try {
                const stored = localStorage.getItem('userProfile');
                if (stored) {
                    userProfile = JSON.parse(stored);
                    if (!userProfile.username) {
                        userProfile.username = 'guest' + Math.floor(Math.random() * 100000);
                    }
                } else {
                    userProfile = { username: 'guest' + Math.floor(Math.random() * 100000) };
                }
            } catch(e) {
                userProfile = { username: 'guest' + Math.floor(Math.random() * 100000) };
            }
            myPlayerId = userProfile.username;
        }

        async function connectToRelay() {
            try {
                relay = new RelayClient(RELAY_SERVER);
                await relay.connect();
                
                relay.joinRoom(ROOM_ID, userProfile.username, userProfile.status || 'player');
                
                relay.on('joined', (data) => {
                    myPlayerId = userProfile.username;
                    allPlayers = data.players || [];
                    updatePlayerList(allPlayers);
                    
                    // Check if tournament is already active - if so, DON'T start countdown
                    if (!gameState.tournamentActive && allPlayers.length >= 1 && !tournamentStartTime) {
                        startTournamentCountdown();
                    }
                    
                    setTimeout(() => {
                        relay.send({ type: 'get_players' });
                    }, 100);
                });

                relay.on('player_joined', (data) => {
                    // Broadcast current tournament state to new player
                    if (gameState.tournamentActive) {
                        relay.send({
                            type: 'game_state',
                            state: { 
                                tournamentActive: true,
                                bracket: gameState.bracket 
                            }
                        });
                    } else if (tournamentStartTime) {
                        relay.send({
                            type: 'game_state',
                            state: { tournamentStartTime, tournamentActive: false }
                        });
                    }
                    relay.send({ type: 'get_players' });
                });
                
                relay.on('player_left', (data) => {
                    const disconnectedPlayer = allPlayers.find(p => p.id === data.player.id);
                    allPlayers = allPlayers.filter(p => p.id !== data.player.id);
                    updatePlayerList(allPlayers);
                    
                    // Check if disconnected player was in current match
                    if (currentMatch && disconnectedPlayer) {
                        const wasInMatch = disconnectedPlayer.username === currentMatch.p1 || 
                                         disconnectedPlayer.username === currentMatch.p2;
                        
                        if (wasInMatch && !isSpectator) {
                            // I win by default
                            setTimeout(() => {
                                endMatch(true);
                            }, 500);
                        }
                    }
                });
                
                relay.on('players_update', (data) => {
                    allPlayers = data.players || [];
                    updatePlayerList(allPlayers);
                    
                    // Sync tournament state
                    if (data.tournamentActive) {
                        if (!gameState.tournamentActive) {
                            gameState.tournamentActive = true;
                            if (data.bracket) {
                                gameState.bracket = data.bracket;
                            }
                        }
                    } else if (data.tournamentStartTime) {
                        if (!tournamentStartTime || data.tournamentStartTime < tournamentStartTime) {
                            tournamentStartTime = data.tournamentStartTime;
                            updateCountdown();
                        }
                    } else if (!gameState.tournamentActive && allPlayers.length >= 1 && !tournamentStartTime) {
                        startTournamentCountdown();
                    }
                });
                
                relay.on('game_state_update', (data) => handleGameStateUpdate(data));
                relay.on('player_action', (data) => handlePlayerAction(data));
                
                startHeartbeat();
                
            } catch (error) {
                console.error('Failed to connect:', error);
                alert('Failed to connect to game server');
            }
        }

        function startHeartbeat() {
            heartbeatInterval = setInterval(() => {
                if (relay && relay.connected && !gameState.tournamentActive) {
                    relay.send({ 
                        type: 'get_players',
                        myTournamentStartTime: tournamentStartTime 
                    });
                }
            }, HEARTBEAT_INTERVAL);
        }

        function startPositionUpdates() {
            if (positionUpdateInterval) clearInterval(positionUpdateInterval);
            
            positionUpdateInterval = setInterval(() => {
                if (relay && relay.connected && currentMatch && !isSpectator) {
                    const myData = players.get(relay.clientId);
                    if (myData) {
                        relay.sendPlayerAction('player_move', { 
                            x: myData.x, 
                            y: myData.y,
                            timestamp: Date.now()
                        });
                    }
                }
            }, 50);
            
            // Start disconnect check
            startDisconnectCheck();
        }

        function startDisconnectCheck() {
            if (disconnectCheckInterval) clearInterval(disconnectCheckInterval);
            
            let lastOpponentUpdate = Date.now();
            const opponentTimestamps = new Map();
            
            // Listen for opponent movements to track their activity
            const originalUpdateOpponent = updateOpponentPosition;
            window.updateOpponentPosition = function(playerId, data) {
                opponentTimestamps.set(playerId, Date.now());
                originalUpdateOpponent(playerId, data);
            };
            
            disconnectCheckInterval = setInterval(() => {
                if (!currentMatch || isSpectator) return;
                
                // Find opponent's clientId
                const myUsername = myPlayerId;
                const opponentUsername = currentMatch.p1 === myUsername ? currentMatch.p2 : currentMatch.p1;
                const opponentClientId = allPlayers.find(p => p.username === opponentUsername)?.id;
                
                if (opponentClientId) {
                    const lastUpdate = opponentTimestamps.get(opponentClientId) || Date.now();
                    const timeSinceUpdate = Date.now() - lastUpdate;
                    
                    // If no update in 5 seconds, opponent disconnected
                    if (timeSinceUpdate > DISCONNECT_CHECK_TIME) {
                        console.log('Opponent disconnected - auto win');
                        clearInterval(disconnectCheckInterval);
                        endMatch(true);
                    }
                }
            }, 1000);
        }

        function stopPositionUpdates() {
            if (positionUpdateInterval) {
                clearInterval(positionUpdateInterval);
                positionUpdateInterval = null;
            }
            if (disconnectCheckInterval) {
                clearInterval(disconnectCheckInterval);
                disconnectCheckInterval = null;
            }
        }

        function startTournamentCountdown() {
            if (tournamentStartTime) return;
            
            tournamentStartTime = Date.now() + TOURNAMENT_WAIT_TIME;
            
            relay.send({
                type: 'game_state',
                state: { 
                    tournamentStartTime, 
                    tournamentActive: false 
                }
            });
            
            updateCountdown();
        }

        function updateCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            
            if (tournamentStartTime) {
                const remaining = Math.max(0, tournamentStartTime - Date.now());
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                document.getElementById('countdownTimer').textContent = 
                    `Next Tournament: ${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
            
            countdownInterval = setInterval(() => {
                if (!tournamentStartTime) return;
                
                const remaining = Math.max(0, tournamentStartTime - Date.now());
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                
                document.getElementById('countdownTimer').textContent = 
                    `Next Tournament: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    if (allPlayers.length >= 2 && !gameState.tournamentActive) {
                        startTournament();
                    } else {
                        tournamentStartTime = null;
                        startTournamentCountdown();
                    }
                }
            }, 100);
        }

        function updatePlayerList(players) {
            const container = document.getElementById('playersContainer');
            container.innerHTML = '';
            
            if (players.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #666;">Waiting for players...</div>';
                return;
            }
            
            players.forEach((player) => {
                const div = document.createElement('div');
                div.className = 'player-item';
                div.innerHTML = `
                    <span style="font-weight: bold;">${player.username}</span>
                    <span style="font-size: 12px; padding: 4px 8px; border-radius: 4px; background: #4ade80; color: #000;">
                        READY
                    </span>
                `;
                container.appendChild(div);
            });
        }

        function handlePlayerAction(data) {
            if (data.action === 'start_tournament') {
                if (!gameState.tournamentActive) {
                    receiveTournamentStart(data.actionData.bracket);
                }
            } else if (data.action === 'player_move' && currentMatch) {
                if (data.playerId !== myPlayerId) {
                    updateOpponentPosition(data.playerId, data.actionData);
                }
            } else if (data.action === 'attack' && currentMatch) {
                handleOpponentAttack(data.actionData, data.playerId);
            } else if (data.action === 'match_end') {
                showMatchResult(data.actionData);
            }
        }

        function startTournament() {
            gameState.tournamentActive = true;
            
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
            
            const bracket = generateBracket(allPlayers);
            gameState.bracket = bracket;
            
            relay.sendPlayerAction('start_tournament', { bracket, tournamentStartTime });
            
            setTimeout(() => {
                showScreen('battleScreen');
                startNextMatch();
            }, 1000);
        }

        function receiveTournamentStart(bracket) {
            gameState.tournamentActive = true;
            gameState.bracket = bracket;
            
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
            
            // Check if I'm in any match
            const amIPlaying = bracket.some(m => m.p1 === myPlayerId || m.p2 === myPlayerId);
            
            if (amIPlaying) {
                setTimeout(() => {
                    showScreen('battleScreen');
                    startNextMatch();
                }, 1000);
            } else {
                // I'm a spectator - just watch
                setTimeout(() => {
                    showScreen('battleScreen');
                    isSpectator = true;
                    document.getElementById('spectatorNotice').style.display = 'block';
                    document.getElementById('battleInfo').textContent = 'TOURNAMENT IN PROGRESS';
                }, 1000);
            }
        }

        function generateBracket(playersList) {
            const shuffled = [...playersList].sort(() => Math.random() - 0.5);
            const matches = [];
            
            for (let i = 0; i < shuffled.length; i += 2) {
                if (i + 1 < shuffled.length) {
                    matches.push({
                        p1: shuffled[i].username,
                        p2: shuffled[i + 1].username,
                        winner: null
                    });
                } else {
                    matches.push({
                        p1: shuffled[i].username,
                        p2: null,
                        winner: shuffled[i].username
                    });
                }
            }
            return matches;
        }

        function startNextMatch() {
            const matches = gameState.bracket.filter(m => !m.winner);
            
            if (matches.length === 0) {
                const winners = gameState.bracket.filter(m => m.winner).map(m => m.winner);
                
                if (winners.length === 1) {
                    endTournament();
                    return;
                } else if (winners.length > 1) {
                    gameState.bracket = generateBracket(winners.map(w => ({ username: w })));
                    startNextMatch();
                    return;
                }
            }
            
            currentMatch = matches[0];
            
            if (currentMatch.p2 === null) {
                currentMatch.winner = currentMatch.p1;
                setTimeout(() => startNextMatch(), 1000);
                return;
            }
            
            isSpectator = currentMatch.p1 !== myPlayerId && currentMatch.p2 !== myPlayerId;
            startBattle(currentMatch);
        }

        function startBattle(match) {
            myHealth = 100;
            opponentHealth = 100;
            players.clear();
            
            const arena = document.getElementById('battleArena');
            arena.querySelectorAll('.player').forEach(el => el.remove());
            
            // Place players in opposite corners
            const maxX = window.innerWidth / 2 - 100;
            const maxY = window.innerHeight / 2 - 150;
            
            const p1X = -maxX;
            const p1Y = -maxY;
            const p2X = maxX;
            const p2Y = maxY;
            
            const p1 = createPlayerElement(match.p1, '#3b82f6', p1X, p1Y);
            const p2 = createPlayerElement(match.p2, '#ef4444', p2X, p2Y);
            
            let p1ClientId = null;
            let p2ClientId = null;
            
            for (let player of allPlayers) {
                if (player.username === match.p1) p1ClientId = player.id;
                if (player.username === match.p2) p2ClientId = player.id;
            }
            
            if (!p1ClientId) p1ClientId = match.p1;
            if (!p2ClientId) p2ClientId = match.p2;
            
            players.set(p1ClientId, { element: p1, x: p1X, y: p1Y, health: 100, username: match.p1 });
            players.set(p2ClientId, { element: p2, x: p2X, y: p2Y, health: 100, username: match.p2 });
            
            if (isSpectator) {
                document.getElementById('spectatorNotice').style.display = 'block';
                document.getElementById('attackMeter').style.opacity = '0.5';
            } else {
                document.getElementById('spectatorNotice').style.display = 'none';
                document.getElementById('attackMeter').style.opacity = '1';
                startGameLoop();
            }
            
            startPositionUpdates();
            
            document.getElementById('battleInfo').textContent = `${match.p1} VS ${match.p2}`;
        }

        function createPlayerElement(username, color, x, y) {
            const player = document.createElement('div');
            player.className = 'player';
            player.style.background = color;
            player.textContent = '⚔️';
            
            const nameTag = document.createElement('div');
            nameTag.className = 'player-name';
            nameTag.textContent = username + (username === myPlayerId ? ' (YOU)' : '');
            player.appendChild(nameTag);
            
            const healthBar = document.createElement('div');
            healthBar.className = 'health-bar';
            healthBar.innerHTML = `
                <div class="health-fill"></div>
                <div class="health-text">100/100</div>
            `;
            player.appendChild(healthBar);
            
            updatePlayerPosition(player, x, y);
            document.getElementById('battleArena').appendChild(player);
            
            return player;
        }

        function updatePlayerPosition(element, x, y) {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            element.style.left = (centerX + x - 20) + 'px';
            element.style.top = (centerY + y - 20) + 'px';
        }

        function startGameLoop() {
            document.addEventListener('keydown', (e) => keys[e.key] = true);
            document.addEventListener('keyup', (e) => keys[e.key] = false);
            document.addEventListener('click', handleAttack);
            
            meterCharge = 0;
            canAttack = true;
            
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!currentMatch || isSpectator) return;
            
            const myData = players.get(relay.clientId);
            if (!myData) return;
            
            let dx = 0, dy = 0;
            
            if (keys['ArrowUp'] || keys['w']) dy -= PLAYER_SPEED;
            if (keys['ArrowDown'] || keys['s']) dy += PLAYER_SPEED;
            if (keys['ArrowLeft'] || keys['a']) dx -= PLAYER_SPEED;
            if (keys['ArrowRight'] || keys['d']) dx += PLAYER_SPEED;
            
            if (dx !== 0 || dy !== 0) {
                const newX = myData.x + dx;
                const newY = myData.y + dy;
                
                const maxX = window.innerWidth / 2 - 60;
                const maxY = window.innerHeight / 2 - 100;
                
                if (Math.abs(newX) < maxX && Math.abs(newY) < maxY) {
                    myData.x = newX;
                    myData.y = newY;
                    updatePlayerPosition(myData.element, myData.x, myData.y);
                }
            }
            
            if (canAttack && !isCharging) {
                isCharging = true;
                startCharging();
            }
            
            requestAnimationFrame(gameLoop);
        }

        function startCharging() {
            if (chargeInterval) clearInterval(chargeInterval);
            
            chargeInterval = setInterval(() => {
                if (meterCharge < 100) {
                    meterCharge += (100 / (ATTACK_CHARGE_TIME / 50));
                    if (meterCharge > 100) meterCharge = 100;
                    document.getElementById('meterFill').style.width = meterCharge + '%';
                }
            }, 50);
        }

        function updateOpponentPosition(playerId, data) {
            const playerData = players.get(playerId);
            
            if (playerData) {
                playerData.x = data.x;
                playerData.y = data.y;
                updatePlayerPosition(playerData.element, data.x, data.y);
            }
        }

        function handleAttack() {
            if (!canAttack || isSpectator || !currentMatch) return;
            
            const myData = players.get(relay.clientId);
            
            const myUsername = myPlayerId;
            const opponentUsername = currentMatch.p1 === myUsername ? currentMatch.p2 : currentMatch.p1;
            const opponentClientId = allPlayers.find(p => p.username === opponentUsername)?.id;
            const opponentData = players.get(opponentClientId);
            
            if (!myData || !opponentData) return;
            
            const distance = Math.sqrt(
                Math.pow(myData.x - opponentData.x, 2) + 
                Math.pow(myData.y - opponentData.y, 2)
            );
            
            let damage = 0;
            let hitType = 'miss';
            
            if (distance <= ATTACK_RANGE) {
                if (meterCharge < 10) {
                    damage = 1;
                    hitType = 'weak';
                } else if (meterCharge >= 90) {
                    damage = 25;
                    hitType = 'critical';
                } else {
                    damage = Math.floor((meterCharge / 100) * 25);
                    hitType = 'normal';
                }
            }
            
            showSwordSwing(myData.element);
            
            relay.sendPlayerAction('attack', {
                damage,
                hitType,
                target: opponentClientId,
                attackerPos: { x: myData.x, y: myData.y }
            });
            
            if (damage > 0) {
                opponentHealth = Math.max(0, opponentHealth - damage);
                updateHealth(opponentClientId, opponentHealth);
                showDamageNumber(damage, hitType, opponentData.element);
                
                if (opponentHealth <= 0) {
                    endMatch(true);
                }
            }
            
            meterCharge = 0;
            document.getElementById('meterFill').style.width = '0%';
            canAttack = true;
        }

        function handleOpponentAttack(attackData, attackerId) {
            const { damage, hitType } = attackData;
            
            if (isSpectator) {
                const attackerData = players.get(attackerId);
                const targetId = currentMatch.p1 === attackerId ? currentMatch.p2 : currentMatch.p1;
                const targetData = players.get(targetId);
                
                if (attackerData) showSwordSwing(attackerData.element);
                
                if (damage > 0 && targetData) {
                    targetData.health = Math.max(0, targetData.health - damage);
                    updateHealth(targetId, targetData.health);
                    showDamageNumber(damage, hitType, targetData.element);
                }
            } else {
                const attackerData = players.get(attackerId);
                if (attackerData) showSwordSwing(attackerData.element);
                
                if (damage > 0) {
                    myHealth = Math.max(0, myHealth - damage);
                    updateHealth(relay.clientId, myHealth);
                    const myData = players.get(relay.clientId);
                    if (myData) showDamageNumber(damage, hitType, myData.element);
                    
                    if (myHealth <= 0) {
                        endMatch(false);
                    }
                }
            }
        }

        function showSwordSwing(playerElement) {
            const swing = document.createElement('div');
            swing.className = 'sword-swing';
            
            const rect = playerElement.getBoundingClientRect();
            swing.style.left = rect.left + rect.width / 2 + 'px';
            swing.style.top = rect.top + rect.height / 2 + 'px';
            swing.style.opacity = '1';
            
            document.body.appendChild(swing);
            
            setTimeout(() => swing.remove(), 200);
        }

        function updateHealth(playerId, health) {
            const playerData = players.get(playerId);
            if (!playerData) return;
            
            const healthFill = playerData.element.querySelector('.health-fill');
            const healthText = playerData.element.querySelector('.health-text');
            
            healthFill.style.width = health + '%';
            healthText.textContent = health + '/100';
        }

        function showDamageNumber(damage, hitType, playerElement) {
            const div = document.createElement('div');
            div.className = 'damage-number';
            if (hitType === 'critical') div.classList.add('critical-hit');
            if (hitType === 'weak') div.classList.add('weak-hit');
            
            div.textContent = '-' + damage;
            
            const rect = playerElement.getBoundingClientRect();
            div.style.left = rect.left + rect.width / 2 + 'px';
            div.style.top = rect.top + 'px';
            
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1000);
        }

        function endMatch(won) {
            if (chargeInterval) clearInterval(chargeInterval);
            stopPositionUpdates();
            document.removeEventListener('click', handleAttack);
            
            currentMatch.winner = won ? myPlayerId : (currentMatch.p1 === myPlayerId ? currentMatch.p2 : currentMatch.p1);
            
            relay.sendPlayerAction('match_end', {
                winner: currentMatch.winner
            });
            
            setTimeout(() => {
                showMatchResult({ won, winnerName: currentMatch.winner });
            }, 1000);
        }

        function showMatchResult(result) {
            showScreen('resultsScreen');
            
            if (result.won || result.winnerName === myPlayerId) {
                document.getElementById('resultTitle').textContent = '🏆 VICTORY!';
                document.getElementById('resultTitle').style.color = '#4ade80';
            } else {
                document.getElementById('resultTitle').textContent = '💀 DEFEAT';
                document.getElementById('resultTitle').style.color = '#ef4444';
            }
            
            const remainingMatches = gameState.bracket.filter(m => !m.winner).length - 1;
            const allWinners = gameState.bracket.filter(m => m.winner).map(m => m.winner);
            const needsNextRound = allWinners.length > 1 && remainingMatches === 0;
            
            if (needsNextRound || remainingMatches > 0) {
                document.getElementById('prizeInfo').textContent = 'Next match starting soon...';
            } else if (allWinners.length === 1 && (result.won || result.winnerName === myPlayerId)) {
                const prize = calculatePrize(allPlayers.length);
                document.getElementById('prizeInfo').textContent = `💰 Tournament Winner! You earned ${prize} coins!`;
                awardPrize(prize);
            } else {
                document.getElementById('prizeInfo').textContent = 'Tournament Over!';
            }
            
            setTimeout(() => {
                if (remainingMatches > 0 || needsNextRound) {
                    showScreen('battleScreen');
                    startNextMatch();
                } else {
                    returnToLobby();
                }
            }, 3000);
        }

        function endTournament() {
            gameState.tournamentActive = false;
            gameState.bracket = null;
            returnToLobby();
        }

        function returnToLobby() {
            stopPositionUpdates();
            showScreen('lobbyScreen');
            players.clear();
            keys = {};
            currentMatch = null;
            gameState.tournamentActive = false;
            gameState.bracket = null;
            gameState.currentMatchIndex = 0;
            
            tournamentStartTime = null;
            if (allPlayers.length >= 1) {
                startTournamentCountdown();
            }
            
            if (!heartbeatInterval) {
                startHeartbeat();
            }
            
            relay.send({ type: 'get_players' });
        }

        function calculatePrize(playerCount) {
            return Math.floor(50 * Math.pow(playerCount, 1.5));
        }

        function awardPrize(amount) {
            window.parent.postMessage({ type: 'updateCoins', coins: parseInt(localStorage.getItem(atob('X2NvaW5EYXRh').split('').reverse().join('')) || '10') + amount }, '*');
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function handleGameStateUpdate(data) {
            if (data.state.tournamentActive) {
                // Tournament is active - join as spectator if not in bracket
                if (!gameState.tournamentActive) {
                    gameState.tournamentActive = true;
                    if (data.state.bracket) {
                        gameState.bracket = data.state.bracket;
                        
                        const amIPlaying = data.state.bracket.some(m => 
                            m.p1 === myPlayerId || m.p2 === myPlayerId
                        );
                        
                        if (!amIPlaying) {
                            // Join as spectator
                            showScreen('battleScreen');
                            isSpectator = true;
                            document.getElementById('spectatorNotice').style.display = 'block';
                            document.getElementById('battleInfo').textContent = 'TOURNAMENT IN PROGRESS';
                        }
                    }
                }
            } else if (data.state.tournamentStartTime) {
                if (!tournamentStartTime || data.state.tournamentStartTime < tournamentStartTime) {
                    tournamentStartTime = data.state.tournamentStartTime;
                    updateCountdown();
                }
            }
        }

        async function init() {
            loadUserProfile();
            await connectToRelay();
        }

        init();
    </script>
</body>
</html>
