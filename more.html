<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More - Rebirth & Achievements</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .back-btn {
            padding: 12px 24px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            margin-bottom: 30px;
        }
        .back-btn:hover {
            background: #252525;
            border-color: #555;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .tabs {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 40px;
        }
        .tab-btn {
            padding: 15px 40px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }
        .tab-btn:hover {
            border-color: #555;
            transform: translateY(-2px);
        }
        .tab-btn.active {
            border-color: #d69e2e;
            background: #2a2a1a;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        
        /* REBIRTH STYLES */
        .rebirth-overview {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            border: 2px solid #d69e2e;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
        }
        .rebirth-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px; 
        }
        .rebirth-stat {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .rebirth-stat-label {
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .rebirth-stat-value {
            color: #d69e2e;
            font-size: 32px;
            font-weight: bold;
        }
        .requirements-section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .requirement-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }
        .requirement-item:last-child {
            border-bottom: none;
        }
        .requirement-label {
            font-size: 16px;
            color: #ccc;
        }
        .progress-bar {
            flex: 1;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin: 0 20px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d69e2e, #ffd700);
            transition: width 0.3s;
        }
        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            font-weight: bold;
            color: #fff;
        }
        .requirement-status {
            font-weight: bold;
            min-width: 80px;
            text-align: right;
        }
        .requirement-status.met {
            color: #38a169;
        }
        .requirement-status.not-met {
            color: #ff4444;
        }
        .impact-sections {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .impact-box {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
        }
        .impact-box.lose {
            border-color: #ff4444;
        }
        .impact-box.keep {
            border-color: #38a169;
        }
        .impact-box.gain {
            border-color: #d69e2e;
        }
        .impact-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }
        .impact-list {
            font-size: 14px;
            color: #ccc;
            line-height: 1.8;
        }
        .rebirth-btn {
            padding: 20px 60px;
            background: #38a169;
            border: 2px solid #2f855a;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            transition: all 0.3s;
            display: block;
            margin: 0 auto;
        }
        .rebirth-btn:hover:not(:disabled) {
            background: #2f855a;
            transform: scale(1.05);
        }
        .rebirth-btn:disabled {
            background: #666;
            border-color: #555;
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        /* ACHIEVEMENT STYLES */
        .achievement-header {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .achievement-summary {
            font-size: 18px;
            color: #d69e2e;
            margin-bottom: 10px;
        }
        .category-filters {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .filter-btn {
            padding: 10px 20px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            border-color: #555;
        }
        .filter-btn.active {
            background: #d69e2e;
            border-color: #b7791f;
            color: #000;
        }
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .achievement-card {
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .achievement-card:hover {
            border-color: #555;
            transform: translateY(-5px);
        }
        .achievement-card.unlocked {
            border-color: #d69e2e;
            background: #2a2a1a;
        }
        .achievement-card.locked {
            opacity: 0.6;
        }
        .achievement-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .achievement-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .achievement-desc {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }
        .achievement-reward {
            color: #d69e2e;
            font-size: 14px;
            font-weight: bold;
        }
        
        /* NOTIFICATION */
        .achievement-notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border: 3px solid #d69e2e;
            border-radius: 16px;
            padding: 40px 60px;
            z-index: 10000;
            text-align: center;
            box-shadow: 0 0 50px rgba(214, 158, 46, 0.5);
            animation: popIn 0.5s ease-out forwards;
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        .notification-title {
            font-size: 32px;
            margin-bottom: 20px;
        }
        .notification-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="window.location.href='index.html'">← BACK</button>
        <h1>✨ MORE</h1>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="rebirth">💎 REBIRTH</button>
            <button class="tab-btn" data-tab="achievements">🏆 ACHIEVEMENTS</button>
        </div>
        
        <!-- REBIRTH TAB -->
        <div class="tab-content active" id="rebirth">
            <div class="rebirth-overview">
                <h2 style="font-size: 28px; margin-bottom: 20px;">💎 REBIRTH SYSTEM</h2>
                <div class="rebirth-stats">
                    <div class="rebirth-stat">
                        <div class="rebirth-stat-label">Current Tier</div>
                        <div class="rebirth-stat-value" id="currentTier">0</div>
                    </div>
                    <div class="rebirth-stat">
                        <div class="rebirth-stat-label">Total Rebirths</div>
                        <div class="rebirth-stat-value" id="totalRebirths">0</div>
                    </div>
                    <div class="rebirth-stat">
                        <div class="rebirth-stat-label">Lifetime Gems</div>
                        <div class="rebirth-stat-value" id="lifetimeGems">0</div>
                    </div>
                </div>
            </div>
            
            <div class="requirements-section">
                <h3 style="margin-bottom: 20px; text-align: center;">Next Rebirth Requirements</h3>
                <div id="requirementsList"></div>
            </div>
            
            <div class="impact-sections">
                <div class="impact-box lose">
                    <div class="impact-title" style="color: #ff4444;">❌ YOU WILL LOSE</div>
                    <div class="impact-list" id="loseList"></div>
                </div>
                <div class="impact-box keep">
                    <div class="impact-title" style="color: #38a169;">✅ YOU WILL KEEP</div>
                    <div class="impact-list" id="keepList"></div>
                </div>
                <div class="impact-box gain">
                    <div class="impact-title" style="color: #d69e2e;">💎 YOU WILL GAIN</div>
                    <div class="impact-list" id="gainList"></div>
                </div>
            </div>
            
            <button class="rebirth-btn" id="rebirthBtn">REBIRTH NOW</button>
        </div>
        
        <!-- ACHIEVEMENTS TAB -->
        <div class="tab-content" id="achievements">
            <div class="achievement-header">
                <div class="achievement-summary" id="achievementSummary">0/15 Achievements Unlocked (0%)</div>
                <div style="color: #888;">Total gems from achievements: <span id="totalAchievementGems" style="color: #d69e2e;">0 💎</span></div>
            </div>
            
            <div class="category-filters">
                <button class="filter-btn active" data-category="all">All</button>
                <button class="filter-btn" data-category="gaming">🎮 Gaming</button>
                <button class="filter-btn" data-category="wealth">💰 Wealth</button>
                <button class="filter-btn" data-category="collector">🎨 Collector</button>
                <button class="filter-btn" data-category="special">⭐ Special</button>
            </div>
            
            <div class="achievements-grid" id="achievementsGrid"></div>
        </div>
    </div>

    <script>
        const _0x4a2b = (s) => btoa(s).split('').reverse().join('');
        const _0x2b4a = (s) => atob(s.split('').reverse().join(''));
        const _0x9c3d = 'X2NvaW5EYXRh';

        function getUserProfile() {
            try {
                const stored = localStorage.getItem('userProfile');
                if (stored) {
                    const profile = JSON.parse(stored);
                    //mwah
                    // Initialize rebirth data
                    if (!profile.rebirthData) {
                        profile.rebirthData = {
                            tier: 0,
                            totalRebirths: 0,
                            totalGemsEarned: 0
                        };
                    }
                    if (typeof profile.gems === 'undefined') profile.gems = 0;
                    
                    // Initialize achievements
                    if (!profile.achievements) {
                        profile.achievements = {
                            unlocked: [],
                            progress: {
                                gamesPlayed: 0,
                                coinsEarned: 0,
                                coinsSpent: 0,
                                cosmeticsOwned: 0
                            }
                        };
                    }
                    
                    return profile;
                }
            } catch(e) {}
            return {
                username: 'guest',
                status: 'player',
                unlockedGames: [],
                equippedCosmetics: { color: 'default', hat: 'none', face: 'none', effect: 'none', sword: 'none' },
                ownedCosmetics: { colors: ['default'], hats: ['none'], faces: ['none'], effects: ['none'], swords: ['none'] },
                rebirthData: { tier: 0, totalRebirths: 0, totalGemsEarned: 0 },
                gems: 0,
                achievements: { unlocked: [], progress: { gamesPlayed: 0, coinsEarned: 0, coinsSpent: 0, cosmeticsOwned: 0 } }
            };
        }

        function saveUserProfile(profile) {
            try {
                localStorage.setItem('userProfile', JSON.stringify(profile));
            } catch(e) {}
        }

        function getCoins() {
            try {
                const stored = localStorage.getItem(_0x2b4a(_0x9c3d));
                if (stored) return parseInt(_0x2b4a(stored));
            } catch(e) {}
            return 10;
        }

        function setCoins(amount) {
            try {
                localStorage.setItem(_0x2b4a(_0x9c3d), _0x4a2b(amount.toString()));
            } catch(e) {}
        }

        let userProfile = getUserProfile();
        let coins = getCoins();

        // ACHIEVEMENTS DATABASE (Simplified - 15 total)
        const achievementsDB = {
            // Gaming (4)
            first_game: { name: 'First Steps', desc: 'Play your first game', icon: '🎮', reward: 1, category: 'gaming' },
            game_explorer: { name: 'Explorer', desc: 'Play 10 different games', icon: '🗺️', reward: 5, category: 'gaming' },
            game_master: { name: 'Game Master', desc: 'Play 50 different games', icon: '👑', reward: 15, category: 'gaming' },
            marathon: { name: 'Marathon', desc: 'Play for 1 hour straight', icon: '⏱️', reward: 10, category: 'gaming' },
            
            // Wealth (4)
            first_coin: { name: 'First Coin', desc: 'Earn 100 coins', icon: '🪙', reward: 1, category: 'wealth' },
            getting_rich: { name: 'Getting Rich', desc: 'Earn 1,000 coins total', icon: '💰', reward: 2, category: 'wealth' },
            entrepreneur: { name: 'Entrepreneur', desc: 'Earn 50,000 coins total', icon: '💼', reward: 10, category: 'wealth' },
            big_spender: { name: 'Big Spender', desc: 'Spend 10,000 coins', icon: '💸', reward: 5, category: 'wealth' },
            
            // Collector (4)
            first_purchase: { name: 'First Purchase', desc: 'Buy any cosmetic', icon: '🛍️', reward: 2, category: 'collector' },
            fashionista: { name: 'Fashionista', desc: 'Own 10 cosmetics', icon: '👗', reward: 8, category: 'collector' },
            collector: { name: 'Collector', desc: 'Own 25 cosmetics', icon: '📦', reward: 20, category: 'collector' },
            completionist: { name: 'Completionist', desc: 'Unlock all locked games', icon: '✅', reward: 25, category: 'collector' },
            
            // Special (3)
            phoenix_rising: { name: 'Phoenix Rising', desc: 'Complete first rebirth', icon: '🔥', reward: 10, category: 'special' },
            rebirth_master: { name: 'Rebirth Master', desc: 'Complete 5 rebirths', icon: '💎', reward: 50, category: 'special' },
            the_fallen: { name: 'The Fallen', desc: 'Lose 10,000 coins total', icon: '💀', reward: 5, category: 'special' }
        };

        // Calculate rebirth requirements
        function getRebirthRequirements(tier) {
            const requirements = {
                1: { coins: 10000, cosmetics: 3, games: 0, swords: 0, gems: 5 },
                2: { coins: 25000, cosmetics: 8, games: 5, swords: 0, gems: 12 },
                3: { coins: 50000, cosmetics: 15, games: 10, swords: 1, gems: 25 },
                4: { coins: 100000, cosmetics: 25, games: 15, swords: 2, gems: 50 },
                5: { coins: 250000, cosmetics: 40, games: 20, swords: 3, gems: 100 }
            };
            
            if (tier <= 5) return requirements[tier];
            
            // Tier 6+ formulas
            const excess = tier - 5;
            return {
                coins: Math.floor(250000 * Math.pow(1.5, excess)),
                cosmetics: Math.floor(40 * Math.pow(1.2, excess)),
                games: 20,
                swords: 3,
                gems: Math.floor(100 * Math.pow(2, excess))
            };
        }

        // Check if requirements met
        function checkRebirthRequirements() {
            const nextTier = userProfile.rebirthData.tier + 1;
            const req = getRebirthRequirements(nextTier);
            
            const totalCosmetics = Object.values(userProfile.ownedCosmetics || {}).reduce((sum, arr) => sum + arr.length, 0);
            const totalSwords = (userProfile.ownedCosmetics?.swords || []).filter(s => s !== 'none').length;
            
            return {
                coins: coins >= req.coins,
                cosmetics: totalCosmetics >= req.cosmetics,
                games: userProfile.unlockedGames.length >= req.games,
                swords: totalSwords >= req.swords,
                allMet: coins >= req.coins && totalCosmetics >= req.cosmetics && 
                        userProfile.unlockedGames.length >= req.games && totalSwords >= req.swords
            };
        }

        // Render rebirth tab
        function renderRebirthTab() {
            const nextTier = userProfile.rebirthData.tier + 1;
            const req = getRebirthRequirements(nextTier);
            const status = checkRebirthRequirements();
            
            document.getElementById('currentTier').textContent = userProfile.rebirthData.tier;
            document.getElementById('totalRebirths').textContent = userProfile.rebirthData.totalRebirths;
            document.getElementById('lifetimeGems').textContent = userProfile.rebirthData.totalGemsEarned;
            
            // Requirements
            const totalCosmetics = Object.values(userProfile.ownedCosmetics || {}).reduce((sum, arr) => sum + arr.length, 0);
            const totalSwords = (userProfile.ownedCosmetics?.swords || []).filter(s => s !== 'none').length;
            
            const reqList = document.getElementById('requirementsList');
            reqList.innerHTML = `
                <div class="requirement-item">
                    <span class="requirement-label">💰 Coins</span>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${Math.min(100, (coins / req.coins) * 100)}%"></div>
                        <div class="progress-text">${coins.toLocaleString()} / ${req.coins.toLocaleString()}</div>
                    </div>
                    <span class="requirement-status ${status.coins ? 'met' : 'not-met'}">${status.coins ? '✅' : '❌'}</span>
                </div>
                <div class="requirement-item">
                    <span class="requirement-label">🎨 Cosmetics</span>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${Math.min(100, (totalCosmetics / req.cosmetics) * 100)}%"></div>
                        <div class="progress-text">${totalCosmetics} / ${req.cosmetics}</div>
                    </div>
                    <span class="requirement-status ${status.cosmetics ? 'met' : 'not-met'}">${status.cosmetics ? '✅' : '❌'}</span>
                </div>
                <div class="requirement-item">
                    <span class="requirement-label">🎮 Unlocked Games</span>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${Math.min(100, (userProfile.unlockedGames.length / req.games) * 100)}%"></div>
                        <div class="progress-text">${userProfile.unlockedGames.length} / ${req.games}</div>
                    </div>
                    <span class="requirement-status ${status.games ? 'met' : 'not-met'}">${status.games ? '✅' : '❌'}</span>
                </div>
                <div class="requirement-item">
                    <span class="requirement-label">⚔️ Swords</span>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${Math.min(100, (totalSwords / req.swords) * 100)}%"></div>
                        <div class="progress-text">${totalSwords} / ${req.swords}</div>
                    </div>
                    <span class="requirement-status ${status.swords ? 'met' : 'not-met'}">${status.swords ? '✅' : '❌'}</span>
                </div>
            `;
            
            // Impact lists
            document.getElementById('loseList').innerHTML = `
                • All coins (${coins.toLocaleString()})<br>
                • All cosmetics (${totalCosmetics} items)<br>
                • Equipped items reset
            `;
            document.getElementById('keepList').innerHTML = `
                • Username (${userProfile.username})<br>
                • Status (${userProfile.status})<br>
                • Unlocked games (${userProfile.unlockedGames.length})<br>
                • All gems (${userProfile.gems})<br>
                • Achievements (${userProfile.achievements.unlocked.length})
            `;
            document.getElementById('gainList').innerHTML = `
                💎 ${req.gems} gems
            `;
            
            // Button state
            const btn = document.getElementById('rebirthBtn');
            btn.disabled = !status.allMet;
            btn.textContent = status.allMet ? 'REBIRTH NOW' : 'REQUIREMENTS NOT MET';
        }

        // Perform rebirth
        document.getElementById('rebirthBtn').addEventListener('click', () => {
            if (!checkRebirthRequirements().allMet) return;
            
            const nextTier = userProfile.rebirthData.tier + 1;
            const req = getRebirthRequirements(nextTier);
            
            if (!confirm(`Are you sure you want to rebirth to Tier ${nextTier}?\n\nYou will lose all coins and cosmetics, but gain ${req.gems} gems!`)) return;
            
            // Reset coins
            coins = 50;
            setCoins(coins);
            
            // Reset cosmetics
            userProfile.ownedCosmetics = {
                colors: ['default'],
                hats: ['none'],
                faces: ['none'],
                effects: ['none'],
                swords: ['none']
            };
            userProfile.equippedCosmetics = {
                color: 'default',
                hat: 'none',
                face: 'none',
                effect: 'none',
                sword: 'none'
            };
            
            // Add gems
            userProfile.gems += req.gems;
            userProfile.rebirthData.tier = nextTier;
            userProfile.rebirthData.totalRebirths++;
            userProfile.rebirthData.totalGemsEarned += req.gems;
            
            // Check achievement
            checkAndUnlockAchievement('phoenix_rising');
            if (userProfile.rebirthData.totalRebirths >= 5) checkAndUnlockAchievement('rebirth_master');
            
            saveUserProfile(userProfile);
            
            alert(`🎉 REBIRTH SUCCESSFUL! 🎉\n\nYou are now Tier ${nextTier}!\n+${req.gems} gems received!`);
            renderRebirthTab();
        });

        // Check and unlock achievement
        function checkAndUnlockAchievement(id) {
            if (userProfile.achievements.unlocked.includes(id)) return;
            
            const achievement = achievementsDB[id];
            if (!achievement) return;
            
            userProfile.achievements.unlocked.push(id);
            userProfile.gems += achievement.reward;
            saveUserProfile(userProfile);
            
            showAchievementNotification(achievement);
        }

        // Show achievement notification
        function showAchievementNotification(achievement) {
            const notification = document.createElement('div');
            notification.className = 'achievement-notification';
            notification.innerHTML = `
                <div class="notification-title">🎉 ACHIEVEMENT UNLOCKED! 🎉</div>
                <div class="notification-icon">${achievement.icon}</div>
                <div style="font-size: 24px; margin-bottom: 10px;">${achievement.name}</div>
                <div style="font-size: 18px; color: #d69e2e;">+${achievement.reward} gems 💎</div>
            `;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'popIn 0.3s ease-out reverse';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Render achievements
        function renderAchievements(filter = 'all') {
            const grid = document.getElementById('achievementsGrid');
            grid.innerHTML = '';
            
            let totalGems = 0;
            
            Object.entries(achievementsDB).forEach(([id, ach]) => {
                if (filter !== 'all' && ach.category !== filter) return;
                
                const unlocked = userProfile.achievements.unlocked.includes(id);
                if (unlocked) totalGems += ach.reward;
                
                const card = document.createElement('div');
                card.className = 'achievement-card ' + (unlocked ? 'unlocked' : 'locked');
                card.innerHTML = `
                    <div class="achievement-icon">${unlocked ? ach.icon : '🔒'}</div>
                    <div class="achievement-name">${unlocked ? ach.name : '???'}</div>
                    <div class="achievement-desc">${unlocked ? ach.desc : 'Locked'}</div>
                    <div class="achievement-reward">${unlocked ? `+${ach.reward} 💎` : '???'}</div>
                `;
                grid.appendChild(card);
            });
            
            // Update summary
            const total = Object.keys(achievementsDB).length;
            const unlocked = userProfile.achievements.unlocked.length;
            const percent = Math.floor((unlocked / total) * 100);
            document.getElementById('achievementSummary').textContent = `${unlocked}/${total} Achievements Unlocked (${percent}%)`;
            document.getElementById('totalAchievementGems').textContent = `${totalGems} 💎`;
        }

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // Category filtering
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderAchievements(btn.dataset.category);
            });
        });

        // Auto-check achievements on load
        function autoCheckAchievements() {
            const progress = userProfile.achievements.progress;
            
            // Gaming
            if (progress.gamesPlayed >= 1) checkAndUnlockAchievement('first_game');
            if (progress.gamesPlayed >= 10) checkAndUnlockAchievement('game_explorer');
            if (progress.gamesPlayed >= 50) checkAndUnlockAchievement('game_master');
            
            // Wealth
            if (progress.coinsEarned >= 100) checkAndUnlockAchievement('first_coin');
            if (progress.coinsEarned >= 1000) checkAndUnlockAchievement('getting_rich');
            if (progress.coinsEarned >= 50000) checkAndUnlockAchievement('entrepreneur');
            if (progress.coinsSpent >= 10000) checkAndUnlockAchievement('big_spender');
            
            // Collector
            if (progress.cosmeticsOwned >= 1) checkAndUnlockAchievement('first_purchase');
            if (progress.cosmeticsOwned >= 10) checkAndUnlockAchievement('fashionista');
            if (progress.cosmeticsOwned >= 25) checkAndUnlockAchievement('collector');
            if (userProfile.unlockedGames.length >= 15) checkAndUnlockAchievement('completionist');
        }

        // Initialize
        renderRebirthTab();
        renderAchievements();
        autoCheckAchievements();
    </script>
</body>
</html>
