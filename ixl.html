<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Groups</title>
  <script>
  if (window.location.pathname.endsWith('.html')) {
    window.location.replace(window.location.pathname.slice(0, -5));
  }
</script>
  <script src="relay-client.js"></script>
  <style>
    body { background:#0d0d0d; color:#fff; font-family:Arial,sans-serif; margin:0; padding:20px; }
    .row { display:flex; gap:10px; align-items:center; }
    button,input { border:1px solid #333; background:#1a1a1a; color:#fff; border-radius:8px; padding:10px; }
    .friend { display:flex; justify-content:space-between; align-items:center; padding:10px; border:1px solid #333; border-radius:8px; margin:8px 0; }
    .online { color:#22c55e; }
    .offline { color:#ef4444; }
    #dmWindow { display:none; margin-top:16px; border:1px solid #333; border-radius:10px; padding:12px; max-width:520px; }
    #dmMessages { height:220px; overflow:auto; background:#111; border-radius:8px; padding:10px; margin-bottom:8px; }
    .msg { margin:6px 0; }
    .muted { color:#aaa; font-size:12px; }
    .friend-name { display:flex; align-items:center; gap:8px; }
    .friend-unread-dot { width:9px; height:9px; border-radius:50%; background:#ef4444; display:inline-block; }
  </style>
</head>
<body>
  <div class="row" style="justify-content:space-between;max-width:800px;">
    <h2 style="margin:0;">📚 Study Groups</h2>
    <button id="mainBtn">⬅ Home</button>
  </div>
  <p class="muted">Add study partners from the home page. Notes only sync when both users are active. Messages are stored locally and may be cleared with browser data.</p>

  <div id="friendsList" style="max-width:800px;"></div>

  <div id="dmWindow">
    <h3 id="dmTitle" style="margin-top:0;">Notes</h3>
    <div id="dmMessages"></div>
    <div class="row">
      <input id="dmInput" placeholder="Type a note..." maxlength="240" style="flex:1;" />
      <button id="sendDmBtn">Send</button>
    </div>
  </div>

<script>
const _r = atob('d3NzOi8vcmVsYXlmYWgub25yZW5kZXIuY29t');
const _up = JSON.parse(localStorage.getItem('userProfile') || '{}');
let _rl = null;
let _ou = new Set();
let _af = null;

if (!_up.username) {
  alert('Log in first.');
  window.location.href = atob('aW5kZXguaHRtbA==');
}

function _fk() { return '_friends_' + _up.username; }
function _gf() {
  try { return JSON.parse(localStorage.getItem(_fk()) || '[]'); }
  catch (e) { return []; }
}
function _sf(list) { localStorage.setItem(_fk(), JSON.stringify(Array.from(new Set(list)))); }
function _uk() { return '_dm_unread_friends_' + _up.username; }
function _guf() {
  try { return new Set(JSON.parse(localStorage.getItem(_uk()) || '[]')); }
  catch (e) { return new Set(); }
}
function _suf(s) {
  localStorage.setItem(_uk(), JSON.stringify(Array.from(s)));
  if (s.size > 0) { localStorage.setItem('_dm_unread', '1'); }
  else { localStorage.removeItem('_dm_unread'); }
}
function _ck(f) { return '_dm_' + _up.username + '_' + f; }
function _ick(f) { return '_dm_' + f + '_' + _up.username; }

function _gc(f) {
  let all = [];
  try { all = all.concat(JSON.parse(localStorage.getItem(_ck(f)) || '[]')); } catch(e){}
  try { all = all.concat(JSON.parse(localStorage.getItem(_ick(f)) || '[]')); } catch(e){}
  return all.sort((a,b) => (a.timestamp||0)-(b.timestamp||0));
}

function renderFriends() {
  const el = document.getElementById('friendsList');
  const friends = _gf();
  if (!friends.length) {
    el.innerHTML = '<div class="muted">No study partners yet.</div>';
    return;
  }
  el.innerHTML = friends.map(name => {
    const online = _ou.has(name);
    const hasUnread = _guf().has(name);
    return `<div class="friend">
      <div class="friend-name"><b>${_eh(name)}</b>${hasUnread ? '<span class="friend-unread-dot" title="Unread"></span>' : ''} <span class="${online ? 'online' : 'offline'}">● ${online ? 'active' : 'away'}</span></div>
      <div class="row">
        <button onclick="openDM('${name.replace(/'/g, "\\'")}')">💬</button>
        <button onclick="removeFriend('${name.replace(/'/g, "\\'")}')">Remove</button>
      </div>
    </div>`;
  }).join('');
}

function openDM(friend) {
  _af = friend;
  const u = _guf();
  u.delete(friend);
  _suf(u);
  document.getElementById('dmWindow').style.display = 'block';
  document.getElementById('dmTitle').textContent = 'Notes with ' + friend;
  renderFriends();
  renderDM();
}

function renderDM() {
  if (!_af) return;
  const msgs = _gc(_af);
  const box = document.getElementById('dmMessages');
  box.innerHTML = msgs.map(m => `<div class="msg"><b>${_eh(m.from)}:</b> ${_eh(m.message)}</div>`).join('');
  box.scrollTop = box.scrollHeight;
}

function removeFriend(name) {
  _sf(_gf().filter(f => f !== name));
  renderFriends();
}

function _sod(to, text) {
  let msgs = [];
  try { msgs = JSON.parse(localStorage.getItem(_ck(to)) || '[]'); } catch(e){}
  msgs.push({ from: _up.username, to, message: text, timestamp: Date.now() });
  localStorage.setItem(_ck(to), JSON.stringify(msgs));
}

function sendDM() {
  const text = document.getElementById('dmInput').value.trim();
  if (!text || !_af) return;
  if (!_rl || !_rl.connected || !_ou.has(_af)) {
    alert('Both users must be active to send notes.');
    return;
  }
  _rl.sendDM(_af, text);
  _sod(_af, text);
  document.getElementById('dmInput').value = '';
  renderDM();
}

function _eh(text) {
  const d = document.createElement('div');
  d.textContent = text || '';
  return d.innerHTML;
}

async function _init() {
  _rl = new RelayClient(_r);

  _rl.on('players_update', (data) => {
    _ou = new Set((data.players || []).map(p => p.username));
    renderFriends();
  });

  _rl.on('joined', (data) => {
    _ou = new Set((data.players || []).map(p => p.username));
    renderFriends();
  });

  _rl.on('dm_message', (data) => {
    const key = _ck(data.fromUsername);
    let msgs = [];
    try { msgs = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){}
    msgs.push({ from: data.fromUsername, to: _up.username, message: data.message, timestamp: Date.now() });
    localStorage.setItem(key, JSON.stringify(msgs));
    const u = _guf();
    u.add(data.fromUsername);
    _suf(u);
    renderFriends();
    if (_af === data.fromUsername) renderDM();
  });

  await _rl.connect();
  _rl.joinRoom(atob('Z2xvYmFsX2NoYXQ='), _up.username, _up.status, _up.permanentId);
}

document.getElementById('mainBtn').addEventListener('click', () => {
  window.location.href = atob('aW5kZXguaHRtbA==');
});
document.getElementById('sendDmBtn').addEventListener('click', sendDM);
document.getElementById('dmInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendDM(); });

renderFriends();
_init().catch(() => {
  alert('Could not connect. Online indicators and notes disabled.');
});

window.openDM = openDM;
window.removeFriend = removeFriend;
</script>
</body>
</html>
